        <div class="row g-0">
          <div class="col-12 col-lg-6 seller-auth-visual">

              <img

          </div>

          <div class="col-12 col-lg-6">
            <div class="seller-auth-panel">
              <a href="index.html" class="d-inline-flex mb-6">
                <span class="seller-auth-brand-icon">
                  <img src="../../assets/img/favicon/favicon.ico" alt="Seller UI logo" />
                </span>
              </a>

              <div class="text-center text-lg-start mb-6">
                <h4 class="mb-1 text-uppercase">Register your shop</h4>
                <p class="mb-0">Set up your seller account and storefront details</p>
              </div>

              <form id="formAuthentication" class="mb-5" action="auth-login-basic.html" method="GET">
                <div class="seller-auth-section-title">Personal Info</div>

                <div class="form-floating form-floating-outline mb-5 form-control-validation">
                  <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" autofocus />
                  <label for="name">Your Name</label>
                </div>

                <div class="form-floating form-floating-outline mb-5 form-control-validation">
                  <input type="email" class="form-control" id="email" name="email" placeholder="Email" autocomplete="email" />
                  <label for="email">Your Email</label>
                </div>

                <div class="form-floating form-floating-outline mb-5 form-control-validation">
                  <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone" autocomplete="tel" />
                  <label for="phone">Your Phone</label>
                </div>

                <div class="mb-5 form-password-toggle form-control-validation">
                  <div class="input-group input-group-merge">
                    <div class="form-floating form-floating-outline">
                      <input type="password" id="password" class="form-control" name="password" placeholder="Password" autocomplete="new-password" />
                      <label for="password">Password</label>
                    </div>
                    <span class="input-group-text cursor-pointer"><i class="icon-base ri ri-eye-off-line icon-20px"></i></span>
                  </div>
                  <div class="seller-auth-password-note">Password must contain at least 6 digits</div>
                </div>

                <div class="mb-5 form-password-toggle form-control-validation">
                  <div class="input-group input-group-merge">
                    <div class="form-floating form-floating-outline">
                      <input
                        type="password"
                        id="password-confirmation"
                        class="form-control"
                        name="password_confirmation"
                        placeholder="Confirm Password"
                        autocomplete="new-password" />
                      <label for="password-confirmation">Confirm Password</label>
                    </div>
                    <span class="input-group-text cursor-pointer"><i class="icon-base ri ri-eye-off-line icon-20px"></i></span>
                  </div>
                </div>

                <div class="seller-auth-section-title pt-1">Basic Info</div>

                <div class="form-floating form-floating-outline mb-5 form-control-validation">
                  <input type="text" class="form-control" id="shop-name" name="shop_name" placeholder="Shop Name" />
                  <label for="shop-name">Shop Name</label>
                </div>

                <div class="form-floating form-floating-outline mb-5 form-control-validation">
                  <input type="text" class="form-control" id="address" name="address" placeholder="Address" />
                  <label for="address">Address</label>
                </div>

                <button class="btn btn-primary d-grid w-100" type="submit">Register Your Shop</button>
